<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Project thumbnail placeholder</title>
  <desc id="desc">Abstract placeholder image for portfolio project cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0ea5a4" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <circle cx="180" cy="130" r="160" fill="#38bdf8" opacity="0.18" />
  <circle cx="980" cy="540" r="200" fill="#22d3ee" opacity="0.16" />
  <rect x="120" y="180" width="960" height="320" rx="24" fill="#ffffff" opacity="0.1" />

  <text x="600" y="315" text-anchor="middle" fill="#ffffff" font-size="64" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Project Thumbnail
  </text>
  <text x="600" y="380" text-anchor="middle" fill="#e2e8f0" font-size="30" font-family="Segoe UI, Arial, sans-serif">
    Add a custom teaser image in post front matter
  </text>
</svg>
