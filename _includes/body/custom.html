<!--
  Fixed animated 3D blueprint background.
  The canvas is decorative only and stays behind page content. Posts can set
  blueprint_model in front matter to use a custom GLB/GLTF background.
-->
{% assign default_blueprint_model = '/assets/models/Assembly_Raspberry_Pi_4_B.glb' %}
{% assign blueprint_model = page.blueprint_model | default: default_blueprint_model %}
<div
  class="blueprint-bg"
  data-model-src="{{ blueprint_model | relative_url }}"
  data-default-model-src="{{ default_blueprint_model | relative_url }}"
  data-model-scale="{{ page.blueprint_model_scale | default: 1 }}"
  data-model-offset-x="{{ page.blueprint_model_offset_x | default: 0 }}"
  aria-hidden="true"
>
  <canvas class="blueprint-bg__canvas"></canvas>
  <span class="blueprint-bg__grid"></span>
  <span class="blueprint-bg__scanline"></span>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
</script>
<script type="module" src="{{ '/assets/js/blueprint-background.js' | relative_url }}"></script>
<script src="{{ '/assets/js/project-cards.js' | relative_url }}" defer></script>
